name: Backend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    container: gcc:4.9

    steps:
    - uses: actions/checkout@v4
    - run: sudo apt-get install -y libmicrohttpd-dev
    - name: check
      working-directory: ./backend
      run: make check
    - name: build
      working-directory: ./backend
      run: make all
    - name: test
      working-directory: ./backend
      run: make test

