name: verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - run: gcc --version
    - run: clang-format --version
    - run: sudo apt-get install -y libmicrohttpd-dev
    - name: check
      working-directory: ./backend
      run: make check
    - name: build
      working-directory: ./backend
      run: make all
