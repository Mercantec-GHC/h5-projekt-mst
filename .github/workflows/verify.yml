name: Verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    container: sfja/h5-mst-ci:1.3
    steps:
    - uses: actions/checkout@v6
    - name: check
      working-directory: ./backend
      run: make check
    - name: build
      working-directory: ./backend
      run: make all
    - name: test
      working-directory: ./backend
      run: make test

  game:
    runs-on: ubuntu-latest
    container: sfja/h5-mst-ci:1.3
    steps:
    - uses: actions/checkout@v6
    - run: rustup default stable
    - name: cache crates
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: check
      working-directory: ./unnamed-game-engine
      run: cargo check
    - name: build
      working-directory: ./unnamed-game-engine
      run: cargo build
    - name: test
      working-directory: ./unnamed-game-engine
      run: cargo test

